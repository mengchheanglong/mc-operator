name: Nightly Reliability Canary

on:
  schedule:
    # 00:30 Asia/Bangkok = 17:30 UTC previous day
    - cron: "30 17 * * *"
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run nightly deterministic canary
        run: npm run reliability:canary
      - name: Upload nightly ops reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-reliability-ops
          path: reports/ops/*
          if-no-files-found: warn
