name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Workflow script integrity
        run: npm run check:workflow-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Runtime tests
        run: npm test

      - name: Reliability summary
        env:
          MISSION_CONTROL_RELIABILITY_SUMMARY_PATH: reports/ops/reliability-summary.json
          MISSION_CONTROL_RELIABILITY_TELEMETRY_PATH: reports/ops/recent-telemetry.json
        run: npm run reliability:summary

      - name: Reliability thresholds
        run: npm run check:reliability

      - name: Upload reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-artifacts
          path: |
            reports/ops/reliability-summary.json
            reports/ops/recent-telemetry.json
          if-no-files-found: warn
          retention-days: 14
